# Minimal Nginx config for a Dockerized static site

events {}

http {
    server {
        listen 80;

        # Main website
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Custom 404 error page
        error_page 404 /error_404.html;
        location = /error_404.html {
            root /usr/share/nginx/html;
            internal;   # Optional: prevents direct access from browser
        }
    }
}